<!DOCTYPE html>
<html lang="en">

<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <meta http-equiv="Content-Security-Policy" content="script-src 'self' 'unsafe-inline' 'unsafe-eval' https://www.gstatic.com https://apis.google.com https://www.googleapis.com https://content.googleapis.com; frame-src https://accounts.google.com https://www.gstatic.com https://content.googleapis.com; connect-src 'self' https://www.gstatic.com https://apis.google.com https://www.googleapis.com https://firestore.googleapis.com https://content.googleapis.com https://oauth2.googleapis.com https://accounts.google.com https://firebaseapp.com https://*.firebaseapp.com https://identitytoolkit.googleapis.com; img-src 'self' data: https:; style-src 'self' 'unsafe-inline' https://fonts.googleapis.com; font-src 'self' https://fonts.gstatic.com;" />
  <title>Time Capsule</title>

  <!-- Google Fonts - Poppins + Roboto -->
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@500;600;700&family=Roboto:wght@400;500&display=swap"
    rel="stylesheet">
    <link rel="icon" href="https://cdn-icons-png.flaticon.com/512/11327/11327008.png" type="image/x-icon">
  <link rel="stylesheet" href="styles/signup.css">

  <!-- Translation System -->
  <script src="scripts/translate.js"></script>

  <style>
    .language-toggle {
      position: fixed;
      top: 20px;
      right: 20px;
      z-index: 10000;
      display: flex;
      gap: 8px;
      background: white;
      padding: 8px 12px;
      border-radius: 8px;
      box-shadow: 0 2px 8px rgba(0,0,0,0.1);
    }
    
    .language-btn {
      padding: 6px 12px;
      border: none;
      border-radius: 4px;
      cursor: pointer;
      font-weight: 600;
      font-size: 14px;
      transition: all 0.3s ease;
      background: #f0f0f0;
      color: #333;
    }
    
    .language-btn.active {
      background: #3d7059;
      color: white;
    }
    
    .language-btn:hover {
      background: #e0e0e0;
    }
    
    .language-btn.active:hover {
      background: #2d5a47;
    }
  </style>
</head>

<body>
  <!-- Language Toggle -->
  <div class="language-toggle">
    <button class="language-btn" id="langEN" onclick="window.translationManager.setLanguage('en')" title="English">EN</button>
    <button class="language-btn" id="langZH" onclick="window.translationManager.setLanguage('zh')" title="中文">中文</button>
  </div>

  <script>
    // Update active language button
    function updateLanguageButtons() {
      const lang = window.translationManager.getLanguage();
      document.getElementById('langEN').classList.toggle('active', lang === 'en');
      document.getElementById('langZH').classList.toggle('active', lang === 'zh');
    }
    updateLanguageButtons();
  </script>
  <div class="page-wrapper">
    <div class="page-content">
      <div class="auth-container">
        <div class="auth-logo">
          <h1 data-i18n="app.name">Time Capsule</h1>
        </div>
        <div class="auth-card">
          <h2 class="auth-title" data-i18n="auth.signup">Create Account</h2>
          <form id="signup-form">
            <div class="form-group">
              <label for="name" data-i18n="auth.name">Full Name</label>
              <input type="text" id="name" name="name" required>
            </div>
            <div class="form-group">
              <label for="username" data-i18n="auth.username">Username</label>
              <input type="text" id="username" name="username" required>
            </div>
            <div class="form-group">
              <label for="email" data-i18n="auth.email">Email (Optional)</label>
              <input type="email" id="email" name="email" data-i18n-placeholder="auth.email">
            </div>
            <div class="form-group">
              <label for="password" data-i18n="auth.password">Password</label>
              <input type="password" id="password" name="password" required>
              <div class="password-requirements">
                <div class="password-requirement" id="req-length" data-i18n="auth.passwordReq">
                  <svg xmlns="http://www.w3.org/2000/svg" width="16" height="16" fill="none" viewBox="0 0 24 24"
                    stroke="currentColor">
                    <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2"
                      d="M9 12l2 2 4-4m6 2a9 9 0 11-18 0 9 9 0 0118 0z" />
                  </svg> At least 8 characters
                </div>
                <div class="password-requirement" id="req-uppercase" data-i18n="auth.uppercaseReq">
                  <svg xmlns="http://www.w3.org/2000/svg" width="16" height="16" fill="none" viewBox="0 0 24 24"
                    stroke="currentColor">
                    <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2"
                      d="M9 12l2 2 4-4m6 2a9 9 0 11-18 0 9 9 0 0118 0z" />
                  </svg> At least 1 uppercase letter
                </div>
                <div class="password-requirement" id="req-number" data-i18n="auth.numberReq">
                  <svg xmlns="http://www.w3.org/2000/svg" width="16" height="16" fill="none" viewBox="0 0 24 24"
                    stroke="currentColor">
                    <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2"
                      d="M9 12l2 2 4-4m6 2a9 9 0 11-18 0 9 9 0 0118 0z" />
                  </svg> At least 1 number
                </div>
              </div>
            </div>
            <div class="form-group">
              <label for="confirm-password" data-i18n="auth.confirmPassword">Confirm Password</label>
              <input type="password" id="confirm-password" name="confirm-password" required>
            </div>

            <div class="terms-checkbox">
              <input type="checkbox" id="accept-terms" required>
              <label for="accept-terms"><span data-i18n="auth.agreeTerms">I agree to the Terms of Service and Privacy Policy</span></label>
            </div>

            <button type="submit" class="btn btn-primary btn-block" id="signup-button" data-i18n="auth.createAccount">Create Account</button>
          </form>
          <div class="auth-footer">
            <p data-i18n="auth.alreadyHaveAccount">Already have an account? <a href="login.html" class="auth-link" data-i18n="auth.signIn">Log In</a></p>
          </div>
        </div>
      </div>
    </div>

    <!-- Footer -->
    <footer class="footer">
      <div class="container">
        <div class="footer-links">
          <a href="other/p&s.html" class="footer-link" data-i18n="footer.privacy">Privacy & Security</a>
          <a href="other/terms.html" class="footer-link" data-i18n="footer.terms">Terms of Service</a>
          <a href="other/about.html" class="footer-link" data-i18n="footer.about">About Us</a>
        </div>
        <div class="footer-copyright">
          <span data-i18n="footer.copyright">&copy; 2026 Time Capsule. All rights reserved.</span>
        </div>
      </div>
    </footer>
  </div>

  <script src="scripts/signup.js" type="module" defer></script>
  
  <script>
    // Ensure translation is applied after all content loads
    document.addEventListener('DOMContentLoaded', function() {
      if (window.translationManager) {
        window.translationManager.applyLanguage();
      }
    });
    
    // Also apply translation after module scripts load
    setTimeout(function() {
      if (window.translationManager) {
        window.translationManager.applyLanguage();
      }
    }, 100);
  </script>
</body>

</html>
