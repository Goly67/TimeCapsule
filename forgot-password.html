<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Forgot Password</title>
  <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@400;500;600;700&family=Roboto:wght@400;500&display=swap" rel="stylesheet">
  <link rel="icon" href="https://cdn-icons-png.flaticon.com/512/11327/11327008.png" type="image/x-icon">
  <link rel="stylesheet" href="styles/forgot-password.css">

  <!-- Translation System -->
  <script src="scripts/translate.js"></script>

  <style>
    .language-toggle {
      position: fixed;
      top: 20px;
      right: 20px;
      z-index: 10000;
      display: flex;
      gap: 8px;
      background: white;
      padding: 8px 12px;
      border-radius: 8px;
      box-shadow: 0 2px 8px rgba(0,0,0,0.1);
    }
    
    .language-btn {
      padding: 6px 12px;
      border: none;
      border-radius: 4px;
      cursor: pointer;
      font-weight: 600;
      font-size: 14px;
      transition: all 0.3s ease;
      background: #f0f0f0;
      color: #333;
    }
    
    .language-btn.active {
      background: #3d7059;
      color: white;
    }
    
    .language-btn:hover {
      background: #e0e0e0;
    }
    
    .language-btn.active:hover {
      background: #2d5a47;
    }
  </style>
</head>
<body>
  <!-- Language Toggle -->
  <div class="language-toggle">
    <button class="language-btn" id="langEN" onclick="window.translationManager.setLanguage('en')" title="English">EN</button>
    <button class="language-btn" id="langZH" onclick="window.translationManager.setLanguage('zh')" title="中文">中文</button>
  </div>

  <script>
    // Initialize language buttons safely
    if (document.readyState === 'loading') {
      document.addEventListener('DOMContentLoaded', () => {
        setTimeout(() => {
          if (window.translationManager) {
            window.translationManager.updateLanguageButtons();
          }
        }, 100);
      });
    } else {
      setTimeout(() => {
        if (window.translationManager) {
          window.translationManager.updateLanguageButtons();
        }
      }, 100);
    }
  </script>
  <div class="page-wrapper">
    <div class="page-content">
      <!-- Email Step -->
      <div class="auth-container" id="email-step">
        <div class="auth-card">
          <div class="auth-title" data-i18n="forgot.title">Forgot Password</div>
          <p class="auth-description" data-i18n="forgot.description">Enter your email to receive a verification code</p>
          
          <div class="error-message" id="email-error" style="display: none;"></div>
          <div class="success-message" id="email-success" style="display: none;"></div>
          
          <form id="email-form" class="auth-form">
            <div class="form-group">
              <label for="email" data-i18n="forgot.emailLabel">Email</label>
              <input type="email" id="email" name="email" data-i18n-placeholder="forgot.emailPlaceholder" placeholder="your@email.com" required>
            </div>
            <button type="submit" class="btn btn-primary btn-block" id="send-code-btn" data-i18n="forgot.sendCode">
              Send Verification Code
              <span class="loading-spinner" style="display: none;"></span>
            </button>
          </form>
          
          <div class="auth-footer">
            <button class="btn btn-outline btn-block" id="back-to-login-btn" data-i18n="forgot.backToLogin">Back to Login</button>
          </div>
        </div>
      </div>
      
      <!-- Verification Step -->
      <div class="auth-container" id="verification-step" style="display: none;">
        <div class="auth-card">
          <div class="auth-title" data-i18n="forgot.verifyTitle">Verify Your Email</div>
          <p class="auth-description" data-i18n="forgot.verifyDescription">Enter the 4-digit code sent to your email</p>
          
          <div class="error-message" id="verification-error" style="display: none;"></div>
          <div class="success-message" id="verification-success" style="display: none;"></div>
          
          <form id="verification-form" class="auth-form">
            <div class="form-group">
              <label for="verification-code" data-i18n="forgot.verificationLabel">Verification Code</label>
              <div class="verification-code-container">
                <input type="text" class="verification-input" maxlength="1" inputmode="numeric" required>
                <input type="text" class="verification-input" maxlength="1" inputmode="numeric" required>
                <input type="text" class="verification-input" maxlength="1" inputmode="numeric" required>
                <input type="text" class="verification-input" maxlength="1" inputmode="numeric" required>
              </div>
            </div>
            <button type="submit" class="btn btn-primary btn-block" id="verify-code-btn" data-i18n="forgot.verifyCode">
              Verify Code
              <span class="loading-spinner" style="display: none;"></span>
            </button>
          </form>
          
          <div class="auth-footer">
            <button class="btn btn-outline btn-block" id="back-to-email-btn" data-i18n="forgot.back">Back</button>
          </div>
        </div>
      </div>
      
      <!-- Reset Password Step -->
      <div class="auth-container" id="reset-step" style="display: none;">
        <div class="auth-card">
          <div class="auth-title" data-i18n="forgot.resetTitle">Reset Your Password</div>
          <p class="auth-description" data-i18n="forgot.resetDescription">Create a new password for your account</p>
          
          <div class="error-message" id="reset-error" style="display: none;"></div>
          <div class="success-message" id="reset-success" style="display: none;"></div>
          
          <form id="reset-form" class="auth-form">
            <div class="form-group">
              <label for="new-password" data-i18n="forgot.newPasswordLabel">New Password</label>
              <input type="password" id="new-password" name="new-password" required minlength="8">
            </div>
            <div class="form-group">
              <label for="confirm-password" data-i18n="forgot.confirmPasswordLabel">Confirm Password</label>
              <input type="password" id="confirm-password" name="confirm-password" required>
            </div>
            <button type="submit" class="btn btn-primary btn-block" id="reset-password-btn" data-i18n="forgot.resetPassword">
              Reset Password
              <span class="loading-spinner" style="display: none;"></span>
            </button>
          </form>
          
          <div class="auth-footer">
            <button class="btn btn-outline btn-block" id="back-to-verification-btn" data-i18n="forgot.back" data-i18n="forgot.back">Back</button>
          </div>
        </div>
      </div>
    </div>
  </div>

  <script src="scripts/forgot-password.js"></script>
</body>
</html>
